<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BTC Whale Tracker - Živý přehled</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    table { border-collapse: collapse; }
    th, td { border: 1px solid #e2e8f0; }
    thead th { border-bottom: 2px solid #1f2937; }
    tr:hover { filter: brightness(0.97); }
  </style>
</head>
<body class="bg-gray-50">
  <div class="max-w-7xl mx-auto p-6">
    <h1 class="text-4xl font-bold text-center mb-2 text-gray-900">BTC Whale Tracker</h1>
    <p class="text-center text-gray-600 mb-8">Živé velké on-chain transakce • Zdroj: Whale Alert</p>

    <div class="flex gap-4 mb-6 justify-center flex-wrap">
      <button onclick="refreshData()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl flex items-center gap-2">
        <i class="fas fa-sync"></i> Obnovit data
      </button>
      <span id="last-update" class="text-sm text-gray-500 self-center"></span>
    </div>

    <div class="bg-white rounded-3xl shadow-xl overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-gray-900 text-white">
          <tr>
            <th class="p-4 text-left">Datum a čas</th>
            <th class="p-4 text-right">Množství BTC</th>
            <th class="p-4 text-right">Hodnota (USD)</th>
            <th class="p-4 text-right">Cena BTC</th>
            <th class="p-4">Směr přesunu</th>
            <th class="p-4">Interpretace</th>
          </tr>
        </thead>
        <tbody id="table-body" class="text-gray-700"></tbody>
      </table>
    </div>

    <p class="text-center text-xs text-gray-500 mt-8">
      Data se načítá z GitHubu
    </p>
  </div>

  <script>
    const DATA_URL = "https://raw.githubusercontent.com/adonay32310-sketch/whale-tracker/main/whale-data.json";

    async function fetchWhaleData() {
      const tbody = document.getElementById('table-body');
      tbody.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-gray-500">Načítám data z GitHubu...</td></tr>`;

      try {
        const res = await fetch(DATA_URL + '?t=' + Date.now());
        if (!res.ok) throw new Error('Chyba');
        
        const data = await res.json();

        let html = '';
        data.forEach(row => {
          const isNakup = row.interp.includes('nákup');
          const rowClass = isNakup ? 'bg-green-50 hover:bg-green-100' : 'bg-red-50 hover:bg-red-100';

          html += `
            <tr class="${rowClass}">
              <td class="p-4 border">${row.time}</td>
              <td class="p-4 text-right font-medium border">${row.btc.toLocaleString()} BTC</td>
              <td class="p-4 text-right border">$${row.usd}</td>
              <td class="p-4 text-right border">$${parseInt(row.price).toLocaleString()}</td>
              <td class="p-4 border">${row.from} → ${row.to}</td>
              <td class="p-4 font-semibold border ${isNakup ? 'text-green-700' : 'text-red-700'}">${row.interp}</td>
            </tr>`;
        });

        tbody.innerHTML = html || `<tr><td colspan="6" class="p-8 text-center">Žádná data</td></tr>`;
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-red-500">Chyba načítání dat z GitHubu</td></tr>`;
      }

      document.getElementById('last-update').textContent = `Naposledy aktualizováno: ${new Date().toLocaleTimeString('cs-CZ')}`;
    }

    function refreshData() {
      fetchWhaleData();
    }

    setInterval(fetchWhaleData, 60000);
    fetchWhaleData();
  </script>
</body>
</html>
