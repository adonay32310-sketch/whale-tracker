name: Update Whale Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Add new whale transaction
        run: |
          echo 'Přidávám novou transakci...'
          TIMESTAMP=$(date '+%d. %m. %Y %H:%M')
          NEW_ENTRY="{\"time\":\"$TIMESTAMP\",\"btc\":650,\"usd\":\"41.6M\",\"price\":\"64200\",\"from\":\"Binance\",\"to\":\"unknown\",\"interp\":\"Potenciální nákup\"}"
          
          if [ -f whale-data.json ]; then
            jq '. + ['"$NEW_ENTRY"']' whale-data.json > temp.json && mv temp.json whale-data.json
          else
            echo "[$NEW_ENTRY]" > whale-data.json
          fi

          echo "Přidána nová transakce."

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add whale-data.json
            git commit -m "chore: automatická aktualizace whale dat ($(date '+%Y-%m-%d %H:%M'))"
            git push
            echo "Data byla aktualizována."
          else
            echo "Žádné změny."
          fi
