name: Update Whale Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install rss-parser axios

      - name: Fetch and update whale data
        run: node update-script.js

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add whale-data.json
            git commit -m "chore: automatická aktualizace whale dat ($(date '+%Y-%m-%d %H:%M'))"
            git push
          else
            echo "Žádné nové změny."
          fi
