name: Update Whale Data

on:
  schedule:
    - cron: '0 * * * *'        # Spouští se každou celou hodinu
  workflow_dispatch:           # Možnost spustit ručně přes tlačítko

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update whale data
        run: |
          echo "Spouštím aktualizaci whale-data.json..."
          # Zde můžeme později přidat automatické stahování dat

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "Žádné změny."
          else
            git add whale-data.json
            git commit -m "chore: aktualizace whale dat ($(date '+%Y-%m-%d %H:%M'))"
            git push
            echo "Data byla úspěšně aktualizována."
          fi
