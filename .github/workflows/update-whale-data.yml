name: Update Whale Data

on:
  schedule:
    - cron: '0 * * * *'        # Automaticky každou hodinu
  workflow_dispatch:
    inputs:
      json_content:
        description: 'Vlož nový obsah whale-data.json (celý JSON)'
        required: false
        type: string

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update whale-data.json (if input provided)
        if: github.event.inputs.json_content != ''
        run: |
          echo '${{ github.event.inputs.json_content }}' > whale-data.json
          echo "JSON byl aktualizován z manuálního inputu."

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add whale-data.json
            git commit -m "chore: aktualizace whale dat ($(date '+%Y-%m-%d %H:%M'))"
            git push
            echo "Změny byly commitnuty."
          else
            echo "Žádné změny k commitu."
          fi
